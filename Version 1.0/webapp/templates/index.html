<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Recogniser — B / 0 / E</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & tokens ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #141414;
      --border:    #2a2a2a;
      --muted:     #3a3a3a;
      --text:      #e8e8e0;
      --dim:       #666;
      --accent:    #c8f060;   /* sharp lime */
      --accent2:   #f06060;   /* coral for negative */
      --accent3:   #60c8f0;   /* sky for neutral */
      --mono:      "IBM Plex Mono", monospace;
      --sans:      "IBM Plex Sans", sans-serif;
      --radius:    4px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Scanline overlay ───────────────────────────────────────────── */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.08) 2px,
        rgba(0,0,0,.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    .shell {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
      margin-bottom: 36px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    header .tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: .12em;
      text-transform: uppercase;
      background: rgba(200,240,96,.08);
      border: 1px solid rgba(200,240,96,.25);
      padding: 2px 8px;
      border-radius: 2px;
    }
    header h1 {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -.01em;
      color: var(--text);
    }
    header p {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }

    /* ── Two-column grid ─────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

    /* ── Panel ───────────────────────────────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .panel-head {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-head .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }
    .panel-body { padding: 20px; }

    /* ── Tabs ────────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .tab {
      font-family: var(--mono);
      font-size: 11px;
      padding: 8px 16px;
      cursor: pointer;
      color: var(--dim);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
      user-select: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Upload zone ─────────────────────────────────────────────────── */
    .upload-zone {
      border: 1px dashed var(--muted);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(200,240,96,.04);
    }
    .upload-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .upload-zone .icon {
      font-size: 28px; line-height: 1; margin-bottom: 10px;
    }
    .upload-zone p {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }
    .upload-zone p strong {
      color: var(--accent);
      font-weight: 400;
    }
    #upload-preview {
      margin-top: 14px;
      display: none;
      align-items: center;
      gap: 12px;
    }
    #upload-preview img {
      width: 56px; height: 56px;
      image-rendering: pixelated;
      border: 1px solid var(--border);
      border-radius: 2px;
    }
    #upload-preview span {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }

    /* ── Canvas draw ─────────────────────────────────────────────────── */
    .canvas-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    #draw-canvas {
      background: #000;
      border: 1px solid var(--border);
      border-radius: 2px;
      cursor: crosshair;
      touch-action: none;
    }
    .canvas-controls {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    .btn {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .06em;
      padding: 9px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
    }
    .btn:hover { background: rgba(255,255,255,.05); border-color: var(--muted); }
    .btn-primary {
      border-color: var(--accent);
      color: var(--accent);
      flex: 1;
    }
    .btn-primary:hover {
      background: rgba(200,240,96,.1);
    }
    .btn-primary:disabled {
      opacity: .35; cursor: not-allowed;
    }
    .btn-ghost { color: var(--dim); }
    .btn-ghost:hover { color: var(--text); }

    /* ── Result panel ────────────────────────────────────────────────── */
    #result-panel {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .3s, transform .3s;
      pointer-events: none;
    }
    #result-panel.visible {
      opacity: 1;
      transform: none;
      pointer-events: auto;
    }

    .prediction-display {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    .pred-char {
      font-family: var(--mono);
      font-size: 72px;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
      text-shadow: 0 0 40px rgba(200,240,96,.35);
      min-width: 72px;
      text-align: center;
    }
    .pred-meta { flex: 1; }
    .pred-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .pred-name {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
    }
    .pred-conf {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
    }

    /* ── Confidence bars ─────────────────────────────────────────────── */
    .conf-bars { display: flex; flex-direction: column; gap: 10px; }
    .conf-row {
      display: grid;
      grid-template-columns: 28px 1fr 52px;
      align-items: center;
      gap: 10px;
    }
    .conf-label {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--dim);
      text-align: right;
    }
    .conf-label.active { color: var(--accent); }
    .bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--muted);
      border-radius: 3px;
      width: 0;
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }
    .bar-fill.active { background: var(--accent); }
    .conf-pct {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      text-align: right;
    }
    .conf-pct.active { color: var(--accent); }

    /* ── 8×8 pixel preview ───────────────────────────────────────────── */
    .pixel-grid-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .pixel-grid-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    #pixel-canvas {
      image-rendering: pixelated;
      border: 1px solid var(--border);
      border-radius: 2px;
      display: block;
    }

    /* ── Error state ─────────────────────────────────────────────────── */
    .error-msg {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent2);
      padding: 10px 14px;
      background: rgba(240,96,96,.06);
      border: 1px solid rgba(240,96,96,.2);
      border-radius: var(--radius);
      display: none;
      margin-top: 12px;
    }

    /* ── Spinner ─────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 1.5px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <span class="tag">64-3-3 NN</span>
    <h1>Character Recogniser</h1>
    <p>B &nbsp;/&nbsp; 0 &nbsp;/&nbsp; E</p>
  </header>

  <div class="grid">

    <!-- ── Left: Input panel ───────────────────────────────────────── -->
    <div class="panel">
      <div class="panel-head"><span class="dot"></span> Input</div>
      <div class="panel-body">

        <div class="tabs">
          <div class="tab active" data-tab="upload">Upload</div>
          <div class="tab" data-tab="draw">Draw</div>
        </div>

        <!-- Upload pane -->
        <div class="tab-pane active" id="pane-upload">
          <div class="upload-zone" id="upload-zone">
            <input type="file" id="file-input" accept="image/*" />
            <div class="icon">⬡</div>
            <p><strong>Click or drag</strong> an image here</p>
            <p style="margin-top:6px">PNG / JPG / BMP · any size</p>
          </div>
          <div id="upload-preview">
            <img id="preview-img" src="" alt="preview" />
            <span id="preview-name"></span>
          </div>
          <div class="error-msg" id="upload-error"></div>
          <button class="btn btn-primary" id="upload-btn" style="margin-top:14px;width:100%;" disabled>
            Run inference
          </button>
        </div>

        <!-- Draw pane -->
        <div class="tab-pane" id="pane-draw">
          <div class="canvas-wrap">
            <canvas id="draw-canvas" width="224" height="224"></canvas>
            <div class="canvas-controls">
              <button class="btn btn-ghost" id="clear-btn">Clear</button>
              <button class="btn btn-primary" id="draw-btn">Run inference</button>
            </div>
          </div>
          <div class="error-msg" id="draw-error"></div>
        </div>

      </div>
    </div>

    <!-- ── Right: Result panel ─────────────────────────────────────── -->
    <div class="panel">
      <div class="panel-head"><span class="dot"></span> Result</div>
      <div class="panel-body">
        <div id="result-panel">

          <!-- Big prediction character + confidence -->
          <div class="prediction-display">
            <div class="pred-char" id="pred-char">—</div>
            <div class="pred-meta">
              <div class="pred-label">Predicted class</div>
              <div class="pred-name" id="pred-name">—</div>
              <div class="pred-conf" id="pred-conf">—</div>
            </div>
          </div>

          <!-- Confidence bars -->
          <div class="conf-bars" id="conf-bars">
            <div class="conf-row" id="row-B">
              <span class="conf-label" id="lbl-B">B</span>
              <div class="bar-track"><div class="bar-fill" id="bar-B"></div></div>
              <span class="conf-pct" id="pct-B">0%</span>
            </div>
            <div class="conf-row" id="row-0">
              <span class="conf-label" id="lbl-0">0</span>
              <div class="bar-track"><div class="bar-fill" id="bar-0"></div></div>
              <span class="conf-pct" id="pct-0">0%</span>
            </div>
            <div class="conf-row" id="row-E">
              <span class="conf-label" id="lbl-E">E</span>
              <div class="bar-track"><div class="bar-fill" id="bar-E"></div></div>
              <span class="conf-pct" id="pct-E">0%</span>
            </div>
          </div>

          <!-- 8×8 preview -->
          <div class="pixel-grid-section">
            <div class="pixel-grid-label">8 × 8 preprocessed input</div>
            <canvas id="pixel-canvas" width="128" height="128"></canvas>
          </div>

        </div>

        <!-- Placeholder before first inference -->
        <div id="result-placeholder" style="
          display:flex; flex-direction:column;
          align-items:center; justify-content:center;
          height:260px; gap:10px;">
          <div style="font-size:32px; opacity:.15;">◈</div>
          <p style="font-family:var(--mono); font-size:11px; color:var(--dim);">
            Upload or draw a character to classify
          </p>
        </div>

      </div>
    </div>

  </div><!-- /grid -->
</div><!-- /shell -->

<script>
/* ── Tab switching ──────────────────────────────────────────────────── */
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("pane-" + tab.dataset.tab).classList.add("active");
  });
});

/* ── Upload zone ────────────────────────────────────────────────────── */
const fileInput   = document.getElementById("file-input");
const uploadZone  = document.getElementById("upload-zone");
const uploadBtn   = document.getElementById("upload-btn");
const previewWrap = document.getElementById("upload-preview");
const previewImg  = document.getElementById("preview-img");
const previewName = document.getElementById("preview-name");
const uploadError = document.getElementById("upload-error");
let uploadedFile  = null;

uploadZone.addEventListener("dragover", e => {
  e.preventDefault(); uploadZone.classList.add("drag-over");
});
uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag-over"));
uploadZone.addEventListener("drop", e => {
  e.preventDefault(); uploadZone.classList.remove("drag-over");
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});
fileInput.addEventListener("change", () => {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
});

function setFile(f) {
  uploadedFile = f;
  uploadBtn.disabled = false;
  previewImg.src = URL.createObjectURL(f);
  previewName.textContent = f.name;
  previewWrap.style.display = "flex";
  uploadError.style.display = "none";
}

uploadBtn.addEventListener("click", async () => {
  if (!uploadedFile) return;
  uploadBtn.disabled = true;
  uploadBtn.innerHTML = '<span class="spinner"></span>Running…';
  uploadError.style.display = "none";

  const fd = new FormData();
  fd.append("image", uploadedFile);

  try {
    const res  = await fetch("/predict", { method: "POST", body: fd });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showResult(data);
  } catch (err) {
    uploadError.textContent = "Error: " + err.message;
    uploadError.style.display = "block";
  } finally {
    uploadBtn.disabled = false;
    uploadBtn.textContent = "Run inference";
  }
});

/* ── Canvas drawing ─────────────────────────────────────────────────── */
const canvas  = document.getElementById("draw-canvas");
const ctx     = canvas.getContext("2d");
const drawBtn = document.getElementById("draw-btn");
const clearBtn= document.getElementById("clear-btn");
const drawError = document.getElementById("draw-error");
let drawing = false;

ctx.fillStyle = "#000";
ctx.fillRect(0, 0, canvas.width, canvas.height);

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

canvas.addEventListener("pointerdown", e => {
  drawing = true;
  ctx.beginPath();
  const p = getPos(e); ctx.moveTo(p.x, p.y);
});
canvas.addEventListener("pointermove", e => {
  if (!drawing) return;
  ctx.lineWidth   = 22;
  ctx.lineCap     = "round";
  ctx.strokeStyle = "#fff";
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
});
canvas.addEventListener("pointerup",   () => { drawing = false; });
canvas.addEventListener("pointerleave",() => { drawing = false; });

clearBtn.addEventListener("click", () => {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawError.style.display = "none";
});

drawBtn.addEventListener("click", async () => {
  drawBtn.disabled = true;
  drawBtn.innerHTML = '<span class="spinner"></span>Running…';
  drawError.style.display = "none";

  try {
    const dataURL = canvas.toDataURL("image/png");
    const res  = await fetch("/predict_canvas", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image: dataURL }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showResult(data);
  } catch (err) {
    drawError.textContent = "Error: " + err.message;
    drawError.style.display = "block";
  } finally {
    drawBtn.disabled = false;
    drawBtn.textContent = "Run inference";
  }
});

/* ── Render result ──────────────────────────────────────────────────── */
const CLASS_NAMES = ["B", "0", "E"];

function showResult(data) {
  document.getElementById("result-placeholder").style.display = "none";
  const panel = document.getElementById("result-panel");
  panel.classList.remove("visible");
  void panel.offsetWidth;   // force reflow for re-animation
  panel.classList.add("visible");

  const pred  = data.prediction;
  const confs = data.confidences;

  document.getElementById("pred-char").textContent = pred;
  document.getElementById("pred-name").textContent =
    pred === "B" ? "Capital B" : pred === "0" ? "Zero (0)" : "Capital E";
  document.getElementById("pred-conf").textContent =
    (confs[pred] * 100).toFixed(1) + "%";

  CLASS_NAMES.forEach(cls => {
    const pct = confs[cls] * 100;
    const isActive = cls === pred;
    document.getElementById("bar-"  + cls).style.width = pct + "%";
    document.getElementById("bar-"  + cls).className = "bar-fill" + (isActive ? " active" : "");
    document.getElementById("pct-"  + cls).textContent = pct.toFixed(1) + "%";
    document.getElementById("pct-"  + cls).className = "conf-pct"  + (isActive ? " active" : "");
    document.getElementById("lbl-"  + cls).className = "conf-label" + (isActive ? " active" : "");
  });

  // 8×8 pixel grid preview
  if (data.pixel_grid) {
    const pc  = document.getElementById("pixel-canvas");
    const pctx = pc.getContext("2d");
    const grid = data.pixel_grid;
    const cell = pc.width / 8;
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        const v = grid[r][c];              // -1.0 or +1.0
        const lum = v > 0 ? 230 : 20;
        pctx.fillStyle = `rgb(${lum},${lum},${lum})`;
        pctx.fillRect(c * cell, r * cell, cell, cell);
      }
    }
    // grid lines
    pctx.strokeStyle = "rgba(255,255,255,.08)";
    pctx.lineWidth = 0.5;
    for (let i = 0; i <= 8; i++) {
      pctx.beginPath(); pctx.moveTo(i*cell, 0); pctx.lineTo(i*cell, pc.height); pctx.stroke();
      pctx.beginPath(); pctx.moveTo(0, i*cell); pctx.lineTo(pc.width, i*cell); pctx.stroke();
    }
  }
}
</script>
</body>
</html>
